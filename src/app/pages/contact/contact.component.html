<div class="page">
  <h1>Contacto</h1>
  <p class="page-intro">¿Tienes preguntas o quieres colaborar? ¡Escríbenos!</p>
  <div class="contact-container">
    <div class="contact-info">
      <div class="info-item">
        <span class="info-icon">&#128231;</span>
        <div>
          <h3>Email</h3>
          <p>contacto&#64;musicaapp.com</p>
        </div>
      </div>
      <div class="info-item">
        <span class="info-icon">&#128222;</span>
        <div>
          <h3>Teléfono</h3>
          <p>+1 (555) 123-4567</p>
        </div>
      </div>
      <div class="info-item">
        <span class="info-icon">&#128205;</span>
        <div>
          <h3>Dirección</h3>
          <p>Av. Musical 123, Ciudad</p>
        </div>
      </div>
      <div class="info-item">
        <span class="info-icon">&#128337;</span>
        <div>
          <h3>Horario</h3>
          <p>Lun - Vie: 9:00 - 18:00</p>
        </div>
      </div>
    </div>
    <form class="contact-form">
      <input type="text" placeholder="Nombre" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Mensaje" rows="5" required></textarea>
      <button type="submit">Enviar Mensaje</button>
    </form>
  </div>
</div>
